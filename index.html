<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Flashcards Pro — Умные карточки</title>
    <link rel="icon" type="image/png" href="./icons8-graduation-cap-96.png">
    
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="modals-lesson.css">
</head>
<body>

    <div class="container">
        <!-- Шапка приложения с кнопкой настроек -->
        <header class="app-header">
            <h1>🎓 Smart Flashcards Pro</h1>
            <div class="settings-menu-container">
                <button class="settings-toggle-btn" onclick="UiManager.toggleSettingsMenu(event)">⚙️</button>
                <div class="settings-dropdown" id="settingsDropdown">
                    <div class="settings-item">
                        <label for="lessonSizeSelect">Карточек в уроке:</label>
                        <select id="lessonSizeSelect" onchange="StorageModule.saveLessonSize(this.value)">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="15">15</option>
                            <option value="20">20</option>
                            <option value="25">25</option>
                        </select>
                    </div>
                    <hr>
                    <button onclick="exportData()">💾 Экспорт данных</button>
                    <input type="file" id="importFileInput" accept=".json" style="display: none;" onchange="importData(event)">
                    <button onclick="document.getElementById('importFileInput').click()">📂 Импорт данных</button>
                </div>
            </div>
        </header>

        <!-- 1. Панель управления (Тройные фильтры + ПОИСК + Прогресс) -->
        <div class="filter-zone" id="controlZone">
            <div class="filter-group">
                <span class="filter-label">Уровень:</span>
                <div class="custom-select-container filter-level-container" id="customSelectContainerLevel">
                    <button class="custom-select-trigger" onclick="UiComboBox.toggleSelect(event, 'customSelectContainerLevel')">
                        <span id="customSelectValueLevel">Все</span><span class="custom-select-arrow">▼</span>
                    </button>
                    <div class="custom-select-options" id="filterLevelOptions"></div>
                </div>
            </div>

            <div class="filter-group">
                <span class="filter-label">Часть речи:</span>
                <div class="custom-select-container filter-partOfSpeech-container" id="customSelectContainerPos">
                    <button class="custom-select-trigger" onclick="UiComboBox.toggleSelect(event, 'customSelectContainerPos')">
                        <span id="customSelectValuePartOfSpeech">Все</span><span class="custom-select-arrow">▼</span>
                    </button>
                    <div class="custom-select-options" id="filterPosOptions"></div>
                </div>
            </div>

            <div class="filter-group">
                <span class="filter-label">Тема:</span>
                <div class="custom-select-container filter-topic-container" id="customSelectContainerTopic">
                    <button class="custom-select-trigger" onclick="UiComboBox.toggleSelect(event, 'customSelectContainerTopic')">
                        <span id="customSelectValueTopic">Все</span><span class="custom-select-arrow">▼</span>
                    </button>
                    <div class="custom-select-options" id="filterTopicOptions"></div>
                </div>
            </div>

            <!-- ИСПРАВЛЕНО: Интерактивный живой поиск по подстроке -->
            <div class="search-group">
                <input type="text" id="appSearchInput" placeholder="🔍 Поиск слова или перевода..." oninput="UiCardsRenderer.renderCards()" autocomplete="off">
            </div>
            
            <!-- ИСПРАВЛЕНО: Метка "Пройдено сегодня" полностью удалена, остались только лаконичные кубики -->
            <div class="daily-progress-box">
                <div class="progress-cubes" id="dailyCubes"></div>
            </div>

            <div class="test-action-group">
                <button class="success-btn" onclick="startLesson()">Старт</button>
            </div>
        </div>

        <!-- 2. Сетка карточек -->
        <div class="grid" id="cardsGrid"></div>

        <!-- Сюда JS динамически внедрит компоненты -->
        <div id="dynamicLessonBoxContainer"></div>
        <div id="dynamicModalContainer"></div>
    </div>

    <script src="storage.js"></script>
    <script src="api.js"></script>
    <script src="lesson-builder.js"></script>
    <script src="lesson-validator.js"></script>
    <script src="lesson-engine.js"></script>
    <script src="ui-core.js"></script>
    <script src="ui-combobox.js"></script>
    <script src="ui-cards-renderer.js"></script>
    <script src="form-handler.js"></script>
    <script src="app.js"></script>
</body>
</html>
